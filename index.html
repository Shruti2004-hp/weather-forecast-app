<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skyline — Weather Forecast</title>
<meta name="description" content="Real-time weather dashboard powered by the OpenWeather API">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body data-condition="clear-day">

<div class="sky" aria-hidden="true">
  <div class="celestial"></div>
  <div class="clouds"></div>
</div>

<main class="app">

  <header class="top">
    <h1 class="logo">Skyline<span>.</span></h1>
    <form class="search" id="searchForm" role="search">
      <input type="text" id="cityInput" placeholder="Search a city…" autocomplete="off" aria-label="City name">
      <button type="submit" aria-label="Search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </form>
    <button class="locate-btn" id="locateBtn" title="Use my location">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="6"/></svg>
    </button>
  </header>

  <div class="state" id="loadingState" hidden>
    <div class="spinner"></div>
    <p>Fetching skies…</p>
  </div>

  <div class="state error" id="errorState" hidden>
    <p id="errorMsg">City not found. Try another search.</p>
  </div>

  <section class="dashboard" id="dashboard" hidden>

    <div class="primary-card">
      <div class="primary-left">
        <p class="place" id="place">—</p>
        <p class="date" id="date">—</p>
        <div class="temp-row">
          <span class="temp" id="temp">--</span>
          <span class="temp-unit">°C</span>
        </div>
        <p class="desc" id="desc">—</p>
        <p class="feels">Feels like <span id="feels">--</span>°C</p>
      </div>
      <div class="primary-right">
        <div class="icon-wrap" id="iconWrap"></div>
      </div>
    </div>

    <div class="stat-grid">
      <div class="stat-card">
        <span class="stat-label">Humidity</span>
        <span class="stat-value" id="humidity">--<small>%</small></span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Wind</span>
        <span class="stat-value" id="wind">--<small>km/h</small></span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Pressure</span>
        <span class="stat-value" id="pressure">--<small>hPa</small></span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Visibility</span>
        <span class="stat-value" id="visibility">--<small>km</small></span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Sunrise</span>
        <span class="stat-value" id="sunrise">--</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Sunset</span>
        <span class="stat-value" id="sunset">--</span>
      </div>
    </div>

  </section>

  <div class="state" id="initState">
    <p>Search for a city, or use your location, to see the forecast.</p>
  </div>

  <footer class="footer">
    <p>Weather data by <a href="https://openweathermap.org/" target="_blank" rel="noopener">OpenWeather</a></p>
  </footer>

</main>

<script src="script.js"></script>
</body>
</html>
